name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/wink-keystore.jks

      - name: Extract version from tag
        run: |
          echo "VERSION_NAME=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV

      - name: Build & sign release APK
        run: |
          KEYSTORE_PATH=wink-keystore.jks \
          KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} \
          KEY_ALIAS=${{ secrets.KEY_ALIAS }} \
          KEY_PASSWORD=${{ secrets.KEY_PASSWORD }} \
          VERSION_NAME=${GITHUB_REF_NAME#v} \
          VERSION_CODE=${{ github.run_number }} \
          ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/Wink-${GITHUB_REF_NAME#v}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Wink ${{ github.ref_name }}"
          body: |
            ## Wink ${{ github.ref_name }}

            亮屏计时 & 用眼提醒助手。

            ### 安装
            下载 APK 安装到 Android 14+ (API 34) 设备。
          files: app/build/outputs/apk/release/Wink-*.apk
